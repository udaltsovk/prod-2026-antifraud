name: antifraud-dev
services:
  postgres_db:
    image: postgres:16-alpine
    restart: on-failure
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: antifraud
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
  redis:
    image: redis:7-alpine
    restart: on-failure
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
volumes:
  postgres-data:
  redis-data:
